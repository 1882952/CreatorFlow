<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CreatorFlow - AI 内容创作平台</title>
  <link rel="icon" type="image/svg+xml" href="./assets/logo.svg">
  <link rel="stylesheet" href="./styles/variables.css">
  <link rel="stylesheet" href="./styles/base.css">
  <link rel="stylesheet" href="./styles/layout.css">
  <link rel="stylesheet" href="./styles/components.css">
  <link rel="stylesheet" href="./modules/assets/assets.css">
  <link rel="stylesheet" href="./modules/digital-human/digital-human.css">
</head>
<body>
  <div id="app-shell">
    <div id="app-body">
      <!-- Sidebar -->
      <aside id="sidebar">
        <div class="sidebar-header">
          <img src="./assets/logo.svg" alt="CF" class="logo-icon">
          <span class="logo-text">CreatorFlow</span>
        </div>

        <nav class="sidebar-nav">
          <div class="nav-item" data-route="/assets">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </span>
            <span class="nav-label">资产总览</span>
          </div>

          <div class="nav-item active" data-route="/digital-human">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <span class="nav-label">数字人生成</span>
          </div>
        </nav>

        <div class="sidebar-footer">
          <div class="nav-item" data-route="/settings">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
              </svg>
            </span>
            <span class="nav-label">设置</span>
          </div>

          <button class="sidebar-toggle" id="sidebar-toggle" data-tooltip="折叠侧边栏">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main id="main-content">
        <div id="module-header-slot"></div>
        <div id="module-content-slot"></div>
      </main>
    </div>

    <!-- Status Bar -->
    <footer id="statusbar">
      <div class="status-item" id="connection-status">
        <span class="status-dot disconnected"></span>
        <span>未连接</span>
      </div>
      <div class="status-item" id="queue-summary">
        队列空闲
      </div>
      <div class="status-item" id="server-address">
        http://127.0.0.1:8188
      </div>
    </footer>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="./core/app.js"></script>
</body>
</html>
